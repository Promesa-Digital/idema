---
deployment:
  tasks:
    - export DEPLOYPATH=/home/idemaedu/public_html/
    - export HOME=/home/idemaedu
    - export PATH=/home/idemaedu/.nvm/versions/node/v20.20.2/bin:$PATH
    - cd /home/idemaedu/repositories/idema
    - echo "[deploy $(date '+%F %T')] Starting"
    - /home/idemaedu/.nvm/versions/node/v20.20.2/bin/npm ci --silent --no-audit --no-fund
    - /home/idemaedu/.nvm/versions/node/v20.20.2/bin/npm run build
    - test -f dist/index.html
    - test -f dist/.htaccess
    - /usr/bin/rsync -a --delete --exclude='.well-known' --exclude='cgi-bin' --exclude='.cpanel' dist/ $DEPLOYPATH
    - echo "[deploy $(date '+%F %T')] Done - $(du -sh $DEPLOYPATH | cut -f1)"
